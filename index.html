
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitlink – Social Closet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EF;
    --sand: #E8E0D5;
    --warm-gray: #C8BFB4;
    --mid: #9A9087;
    --deep: #3D3730;
    --accent: #B8956A;
    --accent-light: #F0E6D8;
    --white: #FDFCFA;
    --danger: #C97A6E;
    --success: #7EA899;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 20px rgba(61,55,48,0.08);
    --shadow-lg: 0 8px 40px rgba(61,55,48,0.14);
    --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ─── Header ─── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--sand);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--deep);
  }

  .logo span { color: var(--accent); font-style: italic; }

  /* ─── Bottom Nav ─── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--sand);
    display: flex;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 0 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--warm-gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: var(--transition);
  }

  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }

  /* ─── Main ─── */
  main {
    padding: 20px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
  }

  .page { display: none; animation: fadeUp 0.3s ease; }
  .page.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Section Title ─── */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .section-sub {
    font-size: 12px;
    color: var(--mid);
    margin-top: 2px;
  }

  /* ─── FAB ─── */
  .fab {
    position: fixed;
    bottom: 76px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--white);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(184,149,106,0.4);
    transition: var(--transition);
    z-index: 99;
  }

  .fab:active { transform: scale(0.94); }
  .fab svg { width: 22px; height: 22px; stroke-width: 2; }

  /* ─── Closet Grid ─── */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--sand);
    background: var(--white);
    color: var(--mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }

  .filter-chip.active {
    background: var(--deep);
    border-color: var(--deep);
    color: var(--white);
  }

  .clothing-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .clothing-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: var(--transition);
    position: relative;
  }

  .clothing-card:active { transform: scale(0.97); }
  .clothing-card.selected { outline: 2.5px solid var(--accent); }

  .clothing-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--sand);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .clothing-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: var(--accent);
  }

  .clothing-img-placeholder svg { width: 32px; height: 32px; opacity: 0.6; }

  .clothing-info {
    padding: 10px 12px 12px;
  }

  .clothing-name {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .clothing-meta {
    font-size: 11px;
    color: var(--mid);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  .badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .badge-private { background: rgba(61,55,48,0.75); color: var(--white); }
  .badge-public  { background: rgba(126,168,153,0.85); color: var(--white); }

  .link-icon {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    text-decoration: none;
  }

  .link-icon svg { width: 14px; height: 14px; stroke-width: 2; }

  .selected-check {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .selected-check svg { width: 14px; height: 14px; stroke-width: 2.5; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--mid);
  }

  .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.4; }
  .empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; margin-bottom: 6px; color: var(--deep); }
  .empty-state p { font-size: 13px; }

  /* ─── Outfit Builder ─── */
  .outfit-builder-top {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .outfit-builder-top h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 12px;
  }

  .selected-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    min-height: 64px;
    align-items: center;
    scrollbar-width: none;
  }

  .selected-strip::-webkit-scrollbar { display: none; }

  .selected-strip-item {
    flex-shrink: 0;
    width: 52px;
    height: 64px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: var(--sand);
  }

  .selected-strip-item img { width: 100%; height: 100%; object-fit: cover; }

  .strip-placeholder {
    color: var(--warm-gray);
    font-size: 12px;
    text-align: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: var(--transition);
    text-decoration: none;
  }

  .btn-primary { background: var(--accent); color: var(--white); width: 100%; }
  .btn-primary:active { background: #a57d58; }
  .btn-outline { background: transparent; border: 1.5px solid var(--sand); color: var(--deep); }
  .btn-danger  { background: var(--danger); color: var(--white); }

  /* ─── Outfit History ─── */
  .outfit-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }

  .outfit-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .outfit-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
  }

  .outfit-loc {
    font-size: 11px;
    color: var(--mid);
    margin-top: 2px;
  }

  .outfit-items-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .outfit-items-row::-webkit-scrollbar { display: none; }

  .outfit-thumb {
    width: 48px;
    height: 58px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--sand);
    flex-shrink: 0;
  }

  .outfit-thumb-placeholder {
    width: 48px;
    height: 58px;
    border-radius: 8px;
    background: var(--accent-light);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 18px;
  }

  .outfit-notes {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.5;
    font-style: italic;
  }

  .outfit-actions { display: flex; gap: 8px; margin-top: 10px; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,55,48,0.45);
    z-index: 200;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 24px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--sand);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 20px;
  }

  /* ─── Form ─── */
  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mid);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="url"], input[type="date"],
  select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius-sm);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--deep);
    outline: none;
    transition: var(--transition);
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--white);
  }

  textarea { resize: none; height: 80px; line-height: 1.5; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius-sm);
    background: var(--cream);
  }

  .toggle-label { font-size: 14px; color: var(--deep); }
  .toggle-sub   { font-size: 11px; color: var(--mid); }

  .toggle {
    position: relative;
    width: 44px;
    height: 26px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--warm-gray);
    border-radius: 13px;
    cursor: pointer;
    transition: var(--transition);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    left: 3px;
    top: 3px;
    transition: var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .toggle input:checked + .toggle-slider { background: var(--success); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

  /* Image upload */
  .img-upload {
    width: 100%;
    aspect-ratio: 3/2;
    border: 2px dashed var(--sand);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    background: var(--cream);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .img-upload:hover { border-color: var(--accent); background: var(--accent-light); }
  .img-upload svg { width: 32px; height: 32px; color: var(--warm-gray); }
  .img-upload span { font-size: 13px; color: var(--mid); }
  .img-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* Color picker row */
  .color-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .color-opt {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: var(--transition);
  }

  .color-opt.selected { border-color: var(--deep); transform: scale(1.15); }
  .color-opt.custom { background: conic-gradient(red, yellow, green, blue, red); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; }

  /* Delete small btn */
  .btn-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: none;
    border: 1.5px solid var(--sand);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--danger);
    transition: var(--transition);
  }

  .btn-icon:active { background: #fae8e6; }
  .btn-icon svg { width: 15px; height: 15px; stroke-width: 2; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--deep);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Select mode banner */
  .select-banner {
    display: none;
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--accent);
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .select-banner.visible { display: flex; }
  .select-banner strong { font-weight: 600; }

  .divider {
    height: 1px;
    background: var(--sand);
    margin: 16px 0;
  }

  /* Color name badge on card */
  .category-tag {
    font-size: 10px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fit<span>link</span></div>
  <div style="font-size:11px;color:var(--mid);letter-spacing:0.08em;text-transform:uppercase;">Social Closet</div>
</header>

<!-- Pages -->
<main>

  <!-- ── CLOSET ── -->
  <div class="page active" id="page-closet">
    <div class="section-header">
      <div>
        <div class="section-title">My Closet</div>
        <div class="section-sub" id="closet-count">0 items</div>
      </div>
    </div>

    <div class="select-banner" id="select-banner">
      <span><strong id="select-count">0</strong> items selected</span>
      <button class="btn btn-primary" style="width:auto;padding:7px 14px;font-size:12px;" onclick="goCreateOutfit()">Create Outfit →</button>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" onclick="filterCloset('All',this)">All</button>
      <button class="filter-chip" onclick="filterCloset('Tops',this)">Tops</button>
      <button class="filter-chip" onclick="filterCloset('Bottoms',this)">Bottoms</button>
      <button class="filter-chip" onclick="filterCloset('Dresses',this)">Dresses</button>
      <button class="filter-chip" onclick="filterCloset('Outerwear',this)">Outerwear</button>
      <button class="filter-chip" onclick="filterCloset('Shoes',this)">Shoes</button>
      <button class="filter-chip" onclick="filterCloset('Accessories',this)">Accessories</button>
    </div>

    <div class="clothing-grid" id="clothing-grid"></div>
    <div id="closet-empty" class="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>
      <h3>Your closet is empty</h3>
      <p>Tap + to add your first item</p>
    </div>
  </div>

  <!-- ── OUTFITS ── -->
  <div class="page" id="page-outfits">
    <div class="section-header">
      <div>
        <div class="section-title">Outfit History</div>
        <div class="section-sub" id="outfit-count">0 outfits</div>
      </div>
    </div>
    <div id="outfit-list"></div>
    <div id="outfit-empty" class="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <h3>No outfits yet</h3>
      <p>Select items from your closet to build one</p>
    </div>
  </div>

</main>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddItem()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-closet" onclick="showPage('closet')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>
    Closet
  </button>
  <button class="nav-btn" id="nav-outfits" onclick="showPage('outfits')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    Outfits
  </button>
</nav>

<!-- ─── Add Item Modal ─── -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="item-modal-title">Add Item</div>

    <div class="form-group">
      <label>Photo</label>
      <div class="img-upload" id="img-upload-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span>Tap to upload</span>
        <input type="file" accept="image/*" id="img-input" onchange="previewImage(event)">
      </div>
    </div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="item-name" placeholder="e.g. Linen Shirt">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="item-category">
        <option value="">Select category…</option>
        <option>Tops</option>
        <option>Bottoms</option>
        <option>Dresses</option>
        <option>Outerwear</option>
        <option>Shoes</option>
        <option>Accessories</option>
      </select>
    </div>

    <div class="form-group">
      <label>Color</label>
      <div class="color-options" id="color-options">
        <div class="color-opt selected" data-color="#F7F4EF" data-name="Cream"    style="background:#F7F4EF;border:2px solid #e0d8cf;" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#1a1a1a" data-name="Black"    style="background:#1a1a1a" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#FFFFFF" data-name="White"    style="background:#FFF;border:2px solid var(--sand)" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#C8BFAF" data-name="Beige"    style="background:#C8BFAF" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#8B6F47" data-name="Brown"    style="background:#8B6F47" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#C97A6E" data-name="Terracotta" style="background:#C97A6E" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#6E91A4" data-name="Blue"     style="background:#6E91A4" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#7EA899" data-name="Sage"     style="background:#7EA899" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#C4A882" data-name="Camel"    style="background:#C4A882" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#6B5B7B" data-name="Lavender" style="background:#6B5B7B" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#D4A5A5" data-name="Blush"    style="background:#D4A5A5" onclick="selectColor(this)"></div>
        <div class="color-opt" data-color="#3D3730" data-name="Charcoal" style="background:#3D3730" onclick="selectColor(this)"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Shopping Link <span style="color:var(--warm-gray);text-transform:none;font-weight:400;">(optional)</span></label>
      <input type="url" id="item-link" placeholder="https://…">
    </div>

    <div class="form-group">
      <label>Visibility</label>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Public</div>
          <div class="toggle-sub">Share with friends</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="item-public">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-item')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- ─── Save Outfit Modal ─── -->
<div class="modal-overlay" id="modal-outfit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Save Outfit</div>

    <div style="margin-bottom:16px;">
      <label>Selected Items</label>
      <div id="outfit-preview-strip" class="selected-strip" style="min-height:70px;"></div>
    </div>

    <div class="form-group">
      <label>Date Worn</label>
      <input type="date" id="outfit-date">
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" id="outfit-location" placeholder="e.g. Farmer's Market, Work…">
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="outfit-notes" placeholder="How did you feel? Any styling tips…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-outfit')">Cancel</button>
      <button class="btn btn-primary" onclick="saveOutfit()">Save Outfit</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let clothes   = JSON.parse(localStorage.getItem('fl_clothes') || '[]');
  let outfits   = JSON.parse(localStorage.getItem('fl_outfits') || '[]');
  let selected  = new Set();
  let editId    = null;
  let imgData   = null;
  let activeFilter = 'All';
  let selectedColor = { color: '#F7F4EF', name: 'Cream' };

  // ── Page routing ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    document.getElementById('fab').style.display = name === 'closet' ? 'flex' : 'none';
    if (name === 'outfits') renderOutfits();
  }

  // ── Modals ──
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay.id); });
  });

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Add / Edit Item ──
  function openAddItem() {
    editId = null;
    imgData = null;
    document.getElementById('item-modal-title').textContent = 'Add Item';
    document.getElementById('item-name').value = '';
    document.getElementById('item-category').value = '';
    document.getElementById('item-link').value = '';
    document.getElementById('item-public').checked = false;
    // reset image preview
    const box = document.getElementById('img-upload-box');
    box.querySelector('img') && box.querySelector('img').remove();
    box.querySelector('svg').style.display = '';
    box.querySelector('span').style.display = '';
    // reset color
    selectColorByDot(document.querySelector('#color-options .color-opt'));
    openModal('modal-item');
  }

  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      imgData = e.target.result;
      const box = document.getElementById('img-upload-box');
      let img = box.querySelector('img');
      if (!img) { img = document.createElement('img'); box.appendChild(img); }
      img.src = imgData;
      box.querySelector('svg').style.display = 'none';
      box.querySelector('span').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function selectColor(el) {
    document.querySelectorAll('.color-opt').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = { color: el.dataset.color, name: el.dataset.name };
  }

  function selectColorByDot(el) {
    if (!el) return;
    document.querySelectorAll('.color-opt').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = { color: el.dataset.color, name: el.dataset.name };
  }

  function saveItem() {
    const name = document.getElementById('item-name').value.trim();
    const cat  = document.getElementById('item-category').value;
    if (!name)  { showToast('Please enter a name'); return; }
    if (!cat)   { showToast('Please select a category'); return; }

    const item = {
      id:       editId || Date.now().toString(),
      name,
      category: cat,
      color:    selectedColor.color,
      colorName: selectedColor.name,
      link:     document.getElementById('item-link').value.trim(),
      isPublic: document.getElementById('item-public').checked,
      image:    imgData || null,
    };

    if (editId) {
      clothes = clothes.map(c => c.id === editId ? item : c);
      showToast('Item updated ✓');
    } else {
      clothes.unshift(item);
      showToast('Item added ✓');
    }

    saveClothes();
    closeModal('modal-item');
    renderCloset();
  }

  function editItem(id) {
    const item = clothes.find(c => c.id === id);
    if (!item) return;
    editId = id;
    imgData = item.image;
    document.getElementById('item-modal-title').textContent = 'Edit Item';
    document.getElementById('item-name').value = item.name;
    document.getElementById('item-category').value = item.category;
    document.getElementById('item-link').value = item.link || '';
    document.getElementById('item-public').checked = item.isPublic;

    // image preview
    const box = document.getElementById('img-upload-box');
    let img = box.querySelector('img');
    if (item.image) {
      if (!img) { img = document.createElement('img'); box.appendChild(img); }
      img.src = item.image;
      box.querySelector('svg').style.display = 'none';
      box.querySelector('span').style.display = 'none';
    } else {
      img && img.remove();
      box.querySelector('svg').style.display = '';
      box.querySelector('span').style.display = '';
    }

    // color
    const dots = document.querySelectorAll('.color-opt');
    let matched = false;
    dots.forEach(d => {
      d.classList.remove('selected');
      if (d.dataset.color === item.color) { d.classList.add('selected'); matched = true; }
    });
    if (!matched) selectColorByDot(dots[0]);
    selectedColor = { color: item.color, name: item.colorName };

    openModal('modal-item');
  }

  function deleteItem(id) {
    if (!confirm('Remove this item from your closet?')) return;
    clothes = clothes.filter(c => c.id !== id);
    selected.delete(id);
    saveClothes();
    renderCloset();
    showToast('Item removed');
  }

  // ── Closet render ──
  function filterCloset(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCloset();
  }

  function toggleSelect(id, card) {
    if (selected.has(id)) { selected.delete(id); card.classList.remove('selected'); }
    else                  { selected.add(id);    card.classList.add('selected'); }
    updateSelectBanner();
  }

  function updateSelectBanner() {
    const banner = document.getElementById('select-banner');
    const count  = document.getElementById('select-count');
    count.textContent = selected.size;
    banner.classList.toggle('visible', selected.size > 0);
    // update check marks
    document.querySelectorAll('.clothing-card').forEach(card => {
      const id = card.dataset.id;
      const check = card.querySelector('.selected-check');
      const link  = card.querySelector('.link-icon');
      if (selected.has(id)) {
        card.classList.add('selected');
        if (check) check.style.display = 'flex';
        if (link)  link.style.display  = 'none';
      } else {
        card.classList.remove('selected');
        if (check) check.style.display = 'none';
        const item = clothes.find(c => c.id === id);
        if (link && item && item.link) link.style.display = 'flex';
      }
    });
  }

  function renderCloset() {
    const grid = document.getElementById('clothing-grid');
    const empty = document.getElementById('closet-empty');
    const countEl = document.getElementById('closet-count');

    const filtered = activeFilter === 'All' ? clothes : clothes.filter(c => c.category === activeFilter);
    countEl.textContent = clothes.length + ' item' + (clothes.length !== 1 ? 's' : '');
    grid.innerHTML = '';

    if (filtered.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'clothing-card' + (selected.has(item.id) ? ' selected' : '');
      card.dataset.id = item.id;

      const imgEl = item.image
        ? `<img src="${item.image}" class="clothing-img" alt="${item.name}">`
        : `<div class="clothing-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:36px;height:36px;opacity:0.5"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg></div>`;

      const linkIcon = item.link && !selected.has(item.id)
        ? `<a href="${item.link}" target="_blank" class="link-icon" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></a>`
        : '';

      const checkIcon = selected.has(item.id)
        ? `<div class="selected-check" style="display:flex;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>`
        : `<div class="selected-check" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>`;

      const badge = `<span class="badge ${item.isPublic ? 'badge-public' : 'badge-private'}">${item.isPublic ? 'Public' : 'Private'}</span>`;

      card.innerHTML = `
        ${imgEl}
        ${linkIcon}
        ${checkIcon}
        ${badge}
        <div class="clothing-info">
          <div class="clothing-name">${item.name}</div>
          <div class="clothing-meta">
            <div class="color-dot" style="background:${item.color}"></div>
            <span>${item.colorName}</span>
            <span>·</span>
            <span class="category-tag">${item.category}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => toggleSelect(item.id, card));
      card.addEventListener('dblclick', () => editItem(item.id));

      grid.appendChild(card);
    });
  }

  // ── Outfit builder ──
  function goCreateOutfit() {
    if (selected.size === 0) { showToast('Select at least one item'); return; }

    // Build preview strip in outfit modal
    const strip = document.getElementById('outfit-preview-strip');
    strip.innerHTML = '';
    selected.forEach(id => {
      const item = clothes.find(c => c.id === id);
      if (!item) return;
      const el = document.createElement('div');
      el.className = 'selected-strip-item';
      if (item.image) {
        el.innerHTML = `<img src="${item.image}" alt="${item.name}">`;
      } else {
        el.style.background = item.color;
        el.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;text-align:center;padding:4px;">${item.name}</div>`;
      }
      strip.appendChild(el);
    });

    // Set today's date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('outfit-date').value = today;
    document.getElementById('outfit-location').value = '';
    document.getElementById('outfit-notes').value = '';

    openModal('modal-outfit');
  }

  function saveOutfit() {
    const date = document.getElementById('outfit-date').value;
    if (!date) { showToast('Please choose a date'); return; }

    const outfit = {
      id:       Date.now().toString(),
      itemIds:  [...selected],
      date,
      location: document.getElementById('outfit-location').value.trim(),
      notes:    document.getElementById('outfit-notes').value.trim(),
    };

    outfits.unshift(outfit);
    saveOutfits();
    closeModal('modal-outfit');
    // Clear selection
    selected.clear();
    updateSelectBanner();
    renderCloset();
    showToast('Outfit saved ✓');
    showPage('outfits');
  }

  function deleteOutfit(id) {
    if (!confirm('Delete this outfit?')) return;
    outfits = outfits.filter(o => o.id !== id);
    saveOutfits();
    renderOutfits();
    showToast('Outfit deleted');
  }

  // ── Outfit history ──
  function renderOutfits() {
    const list  = document.getElementById('outfit-list');
    const empty = document.getElementById('outfit-empty');
    const countEl = document.getElementById('outfit-count');
    countEl.textContent = outfits.length + ' outfit' + (outfits.length !== 1 ? 's' : '');
    list.innerHTML = '';

    if (outfits.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    outfits.forEach(outfit => {
      const card = document.createElement('div');
      card.className = 'outfit-card';

      const dateStr = new Date(outfit.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' });

      const thumbs = outfit.itemIds.map(id => {
        const item = clothes.find(c => c.id === id);
        if (!item) return '';
        if (item.image) return `<img class="outfit-thumb" src="${item.image}" alt="${item.name}" title="${item.name}">`;
        return `<div class="outfit-thumb-placeholder" style="background:${item.color}" title="${item.name}"></div>`;
      }).join('');

      card.innerHTML = `
        <div class="outfit-card-header">
          <div>
            <div class="outfit-date">${dateStr}</div>
            ${outfit.location ? `<div class="outfit-loc">📍 ${outfit.location}</div>` : ''}
          </div>
          <button class="btn-icon" onclick="deleteOutfit('${outfit.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
        <div class="outfit-items-row">${thumbs || '<span style="font-size:12px;color:var(--mid);">No items found</span>'}</div>
        <div style="font-size:11px;color:var(--mid);margin-bottom:4px;">${outfit.itemIds.length} item${outfit.itemIds.length !== 1 ? 's' : ''}</div>
        ${outfit.notes ? `<div class="outfit-notes">"${outfit.notes}"</div>` : ''}
      `;

      list.appendChild(card);
    });
  }

  // ── Persistence ──
  function saveClothes()  { localStorage.setItem('fl_clothes', JSON.stringify(clothes)); }
  function saveOutfits()  { localStorage.setItem('fl_outfits', JSON.stringify(outfits)); }

  // ── Init ──
  renderCloset();
</script>
</body>
</html>
